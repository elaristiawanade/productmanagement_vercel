server:
  port: ${SERVER_PORT:4000}

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/product_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  teams:
    webhook-url: ${TEAMS_WEBHOOK_URL:}
  jwt:
    secret: ${APP_JWT_SECRET:pt_internal_dev_secret_key_2024}
    expiration: ${APP_JWT_EXPIRATION:604800000}
  cors:
    origin: ${APP_CORS_ORIGIN:http://localhost:5173}

logging:
  level:
    com.producttracker: INFO
    org.springframework.security: WARN
